<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* LOGO */
.logo{
    position:absolute;
    top:80px;
    left:20px;
    z-index:10;
}

.logo img{
    height:260px;
}

/* PORTADA */
.brasil{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.overlay{
    background:rgba(0,0,0,0.6);
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.check{
    background:#1da1f2;
    border-radius:50%;
    padding:3px 7px;
    margin-left:5px;
}

/* SECCION */
.seccion{
    display:flex;
    padding:30px;
    gap:20px;
}

/* MENU */
.menu-izquierdo{
    width:220px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

.card i{
    color:#38bdf8;
}

/* CONTENIDO */
.contenido{
    flex:1;
}

/* PUBLICIDAD */
.publicidad{
    width:260px;
    text-align:center;
}

.publicidad img{
    width:100%;
    border-radius:10px;
}

.texto-publicidad{
    margin-top:10px;
    color:#38bdf8;
}

/* FOOTER */
.footer{
    background:#000;
    padding:40px;
    text-align:center;
}

.redes{
    display:flex;
    justify-content:center;
    gap:20px;
}

.red{
    background:red;
    padding:15px;
    border-radius:50%;
    color:#fff;
}

/* ===== MOBILE PERFECTO ===== */
@media (max-width:768px){

    .seccion{
        flex-direction:column;
    }

    .menu-izquierdo{
        width:100%;
    }

    .publicidad{
        width:100%;
    }

    .logo{
        left:50%;
        transform:translateX(-50%);
        top:40px;
    }

    .logo img{
        height:140px;
    }

}
</style>
</head>

<body>

<div class="logo">
    <img src="logo.png">
</div>

<section class="brasil">
    <div class="overlay">
        <h2>🌎 Cubanos en Brasil <span class="check">✔</span> Sitio Oficial</h2>
        <p>Servicios, empleo, noticias y comunidad cubana.</p>
    </div>
</section>

<section class="seccion">

<div class="menu-izquierdo">

<div class="card"><i class="fas fa-box"></i> Envíos a Cuba</div>
<div class="card"><i class="fas fa-money-bill"></i> Remesas</div>
<div class="card"><i class="fas fa-briefcase"></i> Trabajo</div>
<div class="card"><i class="fas fa-graduation-cap"></i> Cursos</div>
<div class="card"><i class="fas fa-newspaper"></i> Noticias</div>
<div class="card"><i class="fas fa-language"></i> Traductor</div>

</div>

<div class="contenido">
<h2>Contenido del sitio</h2>
<p>Aquí puedes colocar tu información.</p>
</div>

<div class="publicidad">
<img src="anuncia tu negocio.png">
<div class="texto-publicidad">
📢 Publicita tu negocio con nosotros
</div>
</div>

</section>

<footer class="footer">
<div class="redes">
<div class="red"><i class="fab fa-facebook-f"></i></div>
<div class="red"><i class="fab fa-instagram"></i></div>
<div class="red"><i class="fab fa-tiktok"></i></div>
</div>
</footer>

</body>
</html>
