<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* ===== HEADER ===== */
.header{
    display:flex;
    align-items:center;
    padding:20px;
}

.logo img{
    width:200px;
}

/* ===== TITULO ===== */
.titulo{
    text-align:center;
    font-size:28px;
    margin:10px 0 30px;
}

/* ===== GRID PRINCIPAL ===== */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:20px;
}

/* ===== BOTONES ===== */
.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    display:flex;
    align-items:center;
    gap:15px;
    transition:0.3s;
    cursor:pointer;
}

.card i{
    font-size:28px;
    color:#38bdf8;
}

.card:hover{
    background:#334155;
    transform:scale(1.03);
}

/* ===== DESTACADO (CENTRO) ===== */
.full{
    grid-column:1 / 3;
    text-align:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
}

/* ===== MOBILE ===== */
@media (max-width:768px){

    .logo img{
        width:140px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }
}
</style>
</head>

<body>

<!-- ===== LOGO ===== -->
<header class="header">
    <div class="logo">
        <img src="logo.png" alt="Cubanos Sin Fronteras">
    </div>
</header>

<!-- ===== TITULO ===== -->
<div class="titulo">Bienvenido al sitio</div>

<!-- ===== CONTENIDO ===== -->
<section class="grid">

<!-- QUIENES SOMOS -->
<div class="card full">
    <i class="fas fa-users"></i>
    <span>¿Quiénes somos?</span>
</div>

<!-- IZQUIERDA -->
<div class="card">
    <i class="fas fa-box"></i>
    <span>Envíos a Cuba</span>
</div>

<div class="card">
    <i class="fas fa-money-bill-wave"></i>
    <span>Recargas Cuba</span>
</div>

<div class="card">
    <i class="fas fa-briefcase"></i>
    <span>Ofertas de trabajo</span>
</div>

<div class="card">
    <i class="fas fa-graduation-cap"></i>
    <span>Cursos online</span>
</div>

<!-- DERECHA -->
<div class="card">
    <i class="fas fa-bullhorn"></i>
    <span>¿Quieres que tu negocio esté aquí?</span>
</div>

<div class="card">
    <i class="fas fa-newspaper"></i>
    <span>Noticias</span>
</div>

<div class="card">
    <i class="fas fa-language"></i>
    <span>Traductores juramentados</span>
</div>

<div class="card">
    <i class="fas fa-store"></i>
    <span>Negocios de cubanos en tu región</span>
</div>

</section>

</body>
</html>
