<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
}

/* ===== BANNER ===== */
.banner{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* IMAGEN */
.banner img{
    width:80%;
    max-width:900px;
    height:auto;
}

/* RESPONSIVE */
@media (max-width:768px){
    .banner img{
        width:95%;
    }
}
</style>
</head>

<body>

<section class="banner">
    <img src="banner.png" alt="Cubanos Sin Fronteras">
</section>

</body>
</html>
