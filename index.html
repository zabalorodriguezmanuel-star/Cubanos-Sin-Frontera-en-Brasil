<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#0a1f44,#00c27a,#ff1e1e);
    color:white;
}

/* ===== BANNER SIN RECORTE ===== */
.header{
    width:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px 0;
}

.header img{
    width:100%;
    height:auto; /* 🔥 NO RECORTA */
    max-height:180px;
    object-fit:contain; /* 🔥 MUESTRA TODO */
}

/* ===== ESTRUCTURA ===== */
.main{
    display:flex;
    flex-wrap:wrap;
}

/* ===== MENU ===== */
.sidebar{
    width:260px;
    padding:20px;
}

/* ===== BOTONES ===== */
.btn{
    display:block;
    margin-bottom:15px;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    background: linear-gradient(45deg,#00c3ff,#00ff95,#ff2e2e);
}

/* ===== CONTENIDO ===== */
.content{
    flex:1;
    padding:40px;
    display:flex;
    justify-content:center;
}

/* ===== BOX ===== */
.box{
    background: rgba(0,0,0,0.7);
    padding:25px;
    border-radius:12px;
    max-width:500px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px){

.main{
    flex-direction:column;
}

.sidebar{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.btn{
    width:90%;
    text-align:center;
}

.content{
    padding:20px;
}

.header img{
    max-height:120px;
}

}

.hidden{
    display:none;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="header">
    <img src="banner.png" alt="Cubanos sin fronteras">
</div>

<div class="main">

<!-- MENU -->
<div class="sidebar">
<a class="btn" href="https://facebook.com" target="_blank">Paquetería a Cuba</a>
<a class="btn" href="https://wa.me/5599999999999" target="_blank">Envío de remesas</a>
<a class="btn" href="https://www.floripanazuera.com" target="_blank">Ofertas de trabajo</a>
<a class="btn" href="https://zabalorodriguezmanuel.hotmart.host/link-in-bio-5b13d0e4-a10d-4f26-ab0b-d6e0a382202b" target="_blank">Cursos online</a>
<a class="btn" href="#">Anuncia tu negocio aquí</a>
<a class="btn" onclick="mostrarNoticias()">Noticias</a>
<a class="btn" href="#">Traductor juramentado</a>
<a class="btn" onclick="mostrarNegocios()">Negocios de cubanos en tu región</a>
</div>

<!-- CONTENIDO -->
<div class="content" id="inicio">
<div class="box">
<h2>¿Quiénes somos?</h2>
<p>Cubanos sin frontera en Brasil sitio único y oficial de los cubanos en Brasil</p>
</div>
</div>

<div class="content hidden" id="noticias">
<button onclick="volver()">Volver</button>
<h2>Noticias</h2>
</div>

<div class="content hidden" id="negocios">
<button onclick="volver()">Volver</button>
<h2>Negocios</h2>
</div>

</div>

<script>
function mostrarNoticias(){
document.getElementById("inicio").style.display="none";
document.getElementById("noticias").style.display="flex";
}

function mostrarNegocios(){
document.getElementById("inicio").style.display="none";
document.getElementById("negocios").style.display="flex";
}

function volver(){
document.getElementById("inicio").style.display="flex";
document.getElementById("noticias").style.display="none";
document.getElementById("negocios").style.display="none";
}
</script>

</body>
</html>
