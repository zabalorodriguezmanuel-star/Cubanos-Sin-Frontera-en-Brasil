<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* LOGO */
.logo{
    position:absolute;
    top:80px;
    left:20px;
}
.logo img{
    height:300px;
}

/* PORTADA */
.brasil{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.overlay{
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:15px;
    text-align:center;
}

/* SECCION */
.seccion{
    display:flex;
    padding:30px;
    gap:20px;
}

.menu-izquierdo{
    width:220px;
    background:#020617;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    background:#1e293b;
    padding:12px;
    border-radius:8px;
    display:flex;
    gap:10px;
}

.card i{
    color:#38bdf8;
}

.contenido{
    flex:1;
}

.publicidad{
    width:260px;
    margin-right:30px;
    margin-top:60px;
    text-align:center;
}

.publicidad img{
    width:100%;
    border-radius:10px;
}

/* ===== FOOTER PRO ===== */
.footer{
    margin-top:50px;
    padding:50px 20px;
    background:#000;
    text-align:center;
}

/* TITULO */
.footer h2{
    margin-bottom:25px;
    color:#fff;
    font-size:24px;
}

/* REDES */
.redes{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:30px;
}

/* CADA RED */
.red{
    text-align:center;
}

/* ICONOS */
.red i{
    font-size:26px;
    padding:18px;
    border-radius:50%;
    background:#ff0000;
    color:#fff;
    box-shadow:0 0 15px rgba(255,0,0,0.8);
    transition:0.3s;
}

.red i:hover{
    transform:scale(1.2);
    box-shadow:0 0 25px rgba(255,0,0,1);
}

/* CONTADORES */
.contador{
    margin-top:10px;
    font-size:15px;
    color:#fff;
    font-weight:bold;
}

/* BOTON EMAIL PRO */
.email-btn{
    margin-top:25px;
    display:inline-block;
    padding:14px 25px;
    background:#ff0000;
    color:#fff;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    box-shadow:0 0 15px rgba(255,0,0,0.8);
    transition:0.3s;
}

.email-btn:hover{
    background:#cc0000;
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(255,0,0,1);
}

/* MOBILE */
@media (max-width:768px){
    .seccion{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
    <img src="logo.png">
</div>

<!-- PORTADA -->
<section class="brasil">
    <div class="overlay">
        <h2>🌎 Cubanos en Brasil ✔️ Sitio Oficial</h2>
        <p>Servicios, empleo, noticias y comunidad cubana.</p>
    </div>
</section>

<!-- SECCION -->
<section class="seccion">

    <div class="menu-izquierdo">
        <div class="card"><i class="fas fa-box"></i> Envíos a Cuba</div>
        <div class="card"><i class="fas fa-money-bill-wave"></i> Recargas</div>
        <div class="card"><i class="fas fa-briefcase"></i> Trabajo</div>
        <div class="card"><i class="fas fa-graduation-cap"></i> Cursos</div>
        <div class="card"><i class="fas fa-newspaper"></i> Noticias</div>
    </div>

    <div class="contenido">
        <h2>Contenido del sitio</h2>
        <p>Descripción del sitio aquí.</p>
    </div>

    <div class="publicidad">
        <img src="anuncia tu negocio.png">
    </div>

</section>

<!-- FOOTER -->
<footer class="footer">

    <h2>🔥 Síguenos y crece con nosotros</h2>

    <div class="redes">

        <div class="red">
            <i class="fab fa-facebook-f"></i>
            <div class="contador">12K seguidores</div>
        </div>

        <div class="red">
            <i class="fab fa-instagram"></i>
            <div class="contador">8.5K seguidores</div>
        </div>

        <div class="red">
            <i class="fab fa-tiktok"></i>
            <div class="contador">15K seguidores</div>
        </div>

    </div>

    <a class="email-btn" href="mailto:zabalorodriguezmanuel@gmail.com">
        ✉️ Contactar por Email
    </a>

</footer>

</body>
</html>
