<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* ===== BANNER ===== */
.banner{
    width:100%;
    height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

.banner img{
    width:90%;
    max-width:1000px;
}

/* ===== BRASIL PRO ===== */
.brasil{
    width:100%;
    height:60vh;
    background:url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325') no-repeat center;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.overlay{
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:12px;
    text-align:center;
}

.overlay h2{
    font-size:32px;
}

.overlay p{
    margin-top:10px;
    font-size:18px;
}

/* ===== BOTONES ===== */
.container{
    padding:40px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    background:#334155;
    transform:scale(1.05);
}

/* ===== WHATSAPP ===== */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:white;
    text-decoration:none;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* RESPONSIVE */
@media (max-width:768px){
    .banner{
        height:50vh;
    }

    .brasil{
        height:45vh;
    }

    .overlay h2{
        font-size:24px;
    }
}
</style>
</head>

<body>

<!-- ===== BANNER ===== -->
<section class="banner">
    <img src="banner.png" alt="Cubanos Sin Fronteras">
</section>

<!-- ===== BRASIL ===== -->
<section class="brasil">
    <div class="overlay">
        <h2>Conectando cubanos en Brasil</h2>
        <p>Oportunidades, servicios y comunidad sin fronteras</p>
    </div>
</section>

<!-- ===== BOTONES ===== -->
<section class="container">

<div class="card"><h3>Paquetería a Cuba</h3></div>
<div class="card"><h3>Envío de Remesas</h3></div>
<div class="card"><h3>Ofertas de Trabajo</h3></div>
<div class="card"><h3>Cursos Online</h3></div>
<div class="card"><h3>Anuncia tu negocio aquí</h3></div>
<div class="card"><h3>Noticias</h3></div>
<div class="card"><h3>Traductor Juramentado</h3></div>
<div class="card"><h3>Negocios de Cubanos en tu región</h3></div>

</section>

<!-- ===== WHATSAPP ===== -->
<a class="whatsapp" href="https://wa.me/5350000000" target="_blank">💬</a>

</body>
</html>
