<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
    display:flex;
}

/* ===== MENU LATERAL ===== */
.sidebar{
    width:80px;
    height:100vh;
    background:#020617;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
    position:fixed;
    left:0;
    top:0;
}

/* LOGO ARRIBA */
.sidebar img{
    width:60px;
    margin-bottom:30px;
}

/* ICONOS EN VERTICAL */
.menu{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.menu a{
    color:#38bdf8;
    font-size:24px;
    text-decoration:none;
    transition:0.3s;
}

.menu a:hover{
    color:#fff;
    transform:scale(1.2);
}

/* ===== CONTENIDO ===== */
.main{
    margin-left:80px;
    width:100%;
}

/* ===== PORTADA ===== */
.brasil{
    width:100%;
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325') no-repeat center;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.overlay{
    background:rgba(0,0,0,0.6);
    padding:25px;
    border-radius:12px;
    text-align:center;
    max-width:500px;
}

.overlay h2{
    font-size:32px;
}

.overlay p{
    margin-top:10px;
    font-size:18px;
}

/* ===== CONTENIDO EXTRA ===== */
.content{
    padding:40px 20px;
}

.content h2{
    margin-bottom:20px;
}

/* ===== WHATSAPP ===== */
.whatsapp{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:white;
    text-decoration:none;
}

/* ===== MOBILE ===== */
@media (max-width:768px){

    .sidebar{
        width:60px;
    }

    .main{
        margin-left:60px;
    }

    .menu a{
        font-size:20px;
    }

    .overlay h2{
        font-size:22px;
    }

    .overlay p{
        font-size:14px;
    }
}
</style>
</head>

<body>

<!-- ===== MENU LATERAL ===== -->
<div class="sidebar">

    <img src="logo.png" alt="Logo">

    <div class="menu">
        <a href="#"><i class="fas fa-box"></i></a>
        <a href="#"><i class="fas fa-money-bill-wave"></i></a>
        <a href="#"><i class="fas fa-briefcase"></i></a>
        <a href="#"><i class="fas fa-graduation-cap"></i></a>
        <a href="#"><i class="fas fa-bullhorn"></i></a>
        <a href="#"><i class="fas fa-newspaper"></i></a>
        <a href="#"><i class="fas fa-language"></i></a>
        <a href="#"><i class="fas fa-store"></i></a>
    </div>

</div>

<!-- ===== CONTENIDO ===== -->
<div class="main">

    <!-- PORTADA -->
    <section class="brasil">
        <div class="overlay">
            <h2>Conectando cubanos en Brasil</h2>
            <p>Oportunidades, servicios y comunidad sin fronteras</p>
        </div>
    </section>

    <!-- CONTENIDO EXTRA PARA HACER LA PAGINA MÁS LARGA -->
    <section class="content">
        <h2>Servicios disponibles</h2>
        <p>Aquí puedes agregar contenido, anuncios o información importante.</p>
    </section>

</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5350000000" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
