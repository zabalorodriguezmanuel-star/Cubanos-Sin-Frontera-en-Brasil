<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* ===== HEADER ===== */
.header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 30px;
    background:rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    z-index:1000;
}

.logo img{
    width:220px;
}

.nav a{
    color:#fff;
    margin-left:20px;
    text-decoration:none;
    font-size:14px;
}

/* ===== PORTADA ===== */
.brasil{
    width:100%;
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325') no-repeat center;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:100px 20px 20px;
}

.overlay{
    background:rgba(0,0,0,0.6);
    padding:25px;
    border-radius:12px;
    text-align:center;
    max-width:500px;
}

/* ===== MENU DERECHO ===== */
.menu-derecho{
    position:fixed;
    top:120px;
    right:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

/* BOTONES */
.card{
    background:#1e293b;
    padding:10px 12px;
    border-radius:8px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    cursor:pointer;
    transition:0.3s;
    white-space:nowrap;
}

.card i{
    font-size:16px;
    color:#38bdf8;
}

.card:hover{
    background:#334155;
    transform:translateX(-5px);
}

/* ===== WHATSAPP ===== */
.whatsapp{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:white;
    text-decoration:none;
}

/* ===== MOBILE ===== */
@media (max-width:768px){

    .nav{
        display:none;
    }

    .logo img{
        width:160px;
    }

    .card span{
        display:none; /* solo iconos en móvil */
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">
        <img src="logo.png">
    </div>
    <nav class="nav">
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Noticias</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<!-- PORTADA -->
<section class="brasil">
    <div class="overlay">
        <h2>Conectando cubanos en Brasil</h2>
        <p>Oportunidades, servicios y comunidad sin fronteras</p>
    </div>
</section>

<!-- MENU LATERAL DERECHO -->
<div class="menu-derecho">

<div class="card"><i class="fas fa-box"></i><span>Envíos a Cuba</span></div>
<div class="card"><i class="fas fa-money-bill-wave"></i><span>Recargas Cuba</span></div>
<div class="card"><i class="fas fa-briefcase"></i><span>Ofertas de trabajo</span></div>
<div class="card"><i class="fas fa-graduation-cap"></i><span>Cursos online</span></div>
<div class="card"><i class="fas fa-bullhorn"></i><span>Anuncia tu negocio</span></div>
<div class="card"><i class="fas fa-newspaper"></i><span>Noticias</span></div>
<div class="card"><i class="fas fa-language"></i><span>Traductor juramentado</span></div>
<div class="card"><i class="fas fa-store"></i><span>Negocios en tu región</span></div>

</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5350000000" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
