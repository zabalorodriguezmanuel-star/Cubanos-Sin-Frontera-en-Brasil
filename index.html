<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* ===== PORTADA BRASIL ===== */
.brasil{
    width:100%;
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325') no-repeat center;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* TEXTO ENCIMA */
.overlay{
    background:rgba(0,0,0,0.6);
    padding:25px;
    border-radius:12px;
    text-align:center;
    max-width:500px;
}

.overlay h2{
    font-size:32px;
}

.overlay p{
    margin-top:10px;
    font-size:18px;
}

/* ===== BOTONES ===== */
.container{
    padding:30px 20px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
    gap:15px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    background:#334155;
    transform:scale(1.05);
}

.card h3{
    font-size:16px;
}

/* ===== WHATSAPP ===== */
.whatsapp{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:white;
    text-decoration:none;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* ===== MOBILE AJUSTES ===== */
@media (max-width:768px){

    .overlay{
        padding:20px;
    }

    .overlay h2{
        font-size:22px;
    }

    .overlay p{
        font-size:14px;
    }

    .container{
        grid-template-columns: repeat(2,1fr);
    }

    .card h3{
        font-size:14px;
    }
}
</style>
</head>

<body>

<!-- ===== PORTADA ===== -->
<section class="brasil">
    <div class="overlay">
        <h2>Conectando cubanos en Brasil</h2>
        <p>Oportunidades, servicios y comunidad sin fronteras</p>
    </div>
</section>

<!-- ===== BOTONES ===== -->
<section class="container">

<div class="card"><h3>Paquetería a Cuba</h3></div>
<div class="card"><h3>Envío de Remesas</h3></div>
<div class="card"><h3>Ofertas de Trabajo</h3></div>
<div class="card"><h3>Cursos Online</h3></div>
<div class="card"><h3>Anuncia tu negocio aquí</h3></div>
<div class="card"><h3>Noticias</h3></div>
<div class="card"><h3>Traductor Juramentado</h3></div>
<div class="card"><h3>Negocios de Cubanos en tu región</h3></div>

</section>

<!-- ===== WHATSAPP ===== -->
<a class="whatsapp" href="https://wa.me/5350000000" target="_blank">💬</a>

</body>
</html>
