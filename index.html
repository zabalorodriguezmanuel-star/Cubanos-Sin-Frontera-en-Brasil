<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubanos Sin Fronteras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* ===== FOOTER ===== */
.footer{
    margin-top:50px;
    padding:50px 20px;
    background:#000;
    text-align:center;
}

.footer h2{
    margin-bottom:25px;
}

/* REDES */
.redes{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:30px;
}

.red{
    text-align:center;
    position:relative;
}

/* ICONOS */
.red i{
    font-size:26px;
    padding:18px;
    border-radius:50%;
    background:#ff0000;
    color:#fff;
    box-shadow:0 0 15px rgba(255,0,0,0.8);
}

/* VERIFICADO */
.verificado{
    position:absolute;
    top:-5px;
    right:-5px;
    background:#1da1f2;
    color:#fff;
    font-size:10px;
    padding:5px;
    border-radius:50%;
    box-shadow:0 0 8px rgba(29,161,242,0.8);
}

/* CONTADORES */
.contador{
    margin-top:10px;
    font-weight:bold;
}

/* BOTON EMAIL */
.email-btn{
    margin-top:25px;
    display:inline-block;
    padding:14px 25px;
    background:#ff0000;
    color:#fff;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 15px rgba(255,0,0,0.8);
}
</style>
</head>

<body>

<footer class="footer">

    <h2>🔥 Síguenos y crece con nosotros</h2>

    <div class="redes">

        <div class="red">
            <i class="fab fa-facebook-f"></i>
            <div class="verificado">✔</div>
            <div class="contador">12K seguidores</div>
        </div>

        <div class="red">
            <i class="fab fa-instagram"></i>
            <div class="verificado">✔</div>
            <div class="contador">8.5K seguidores</div>
        </div>

        <div class="red">
            <i class="fab fa-tiktok"></i>
            <div class="verificado">✔</div>
            <div class="contador">15K seguidores</div>
        </div>

    </div>

    <a class="email-btn" href="mailto:zabalorodriguezmanuel@gmail.com">
        ✉️ Contactar por Email
    </a>

</footer>

</body>
</html>
